resources:
  jobs:
    data_ingestion:
      name: data_ingestion
      tasks:
        - task_key: ingestion_table_load
          notebook_task:
            notebook_path: ../../src/ingestion/data_ingestion.ipynb
            base_parameters:
              catalog: ${var.catalog_name}
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
