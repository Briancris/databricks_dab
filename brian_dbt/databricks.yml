# This is a Databricks asset bundle definition for brian_dbt.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: brian_dbt
  uuid: 5e38c30d-9a34-4d2d-a912-6e93b03d9ac9

include:
  - resources/*.yml
  - resources/*/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-3f413dd0-6706.cloud.databricks.com
      root_path: /Workspace/Users/brianchriscc@gmail.com/DEV/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-3f413dd0-6706.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/brianchriscc@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/brianchriscc@gmail.com/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: brianchriscc@gmail.com
        level: CAN_MANAGE
